################
### 个人配置 ###
################
# 禁用XWayland的缩放
xwayland {
  force_zero_scaling = true
}

env = GDK_SCALE,2

# waybar
exec-once = waybar

# fcitx5
exec-once = fcitx5

# 显示器配置 
monitorv2 {
	output = eDP-1
	mode = 2560x1600@300
	position = 0x0
	scale = 1.6
}

# 启动 swww 守护进程
exec-once = swww-daemon

# 随机切换壁纸快捷键
bind = $mainMod, W, exec, ~/.config/hypr/scripts/swww-random.sh

# 启动时随机壁纸
exec-once = sleep 0 && ~/.config/hypr/scripts/swww-random.sh

# 每5分钟自动切换
exec-once = while true; do sleep 300; ~/.config/hypr/scripts/swww-random.sh; done

# Flameshot 区域截图 (按 PrtSc 键)
# bind = , Print, exec, flameshot gui
# Flameshot 全屏截图 (按 Shift + PrtSc)
# bind = SHIFT, Print, exec, flameshot full --path ~/Pictures/Screenshots

# hyprshot截图
bind = SHIFT, Print, exec, hyprshot -m output
bind = CONTROL, Print, exec, hyprshot -m window
bind = , Print, exec, hyprshot -m region

# cliphit剪贴板
exec-once = wl-paste --type text --watch cliphist store 
exec-once = wl-paste --type image --watch cliphist store
bind = SUPER, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# obs录屏
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP 

# 为所有窗口设置透明度
windowrule = opacity 0.9 0.9 0.9, match:class = .*

# wayland的模糊
layerrule = blur on, match:namespace ^waybar$
layerrule = blur on, match:namespace ^wofi$

# # 暗色切换
# env = QT_QPA_PLATFORMTHEME, qt5ct
# env = QT_AUTO_SCREEN_SCALE_FACTOR,1

# # 如果你使用 Kvantum，设置 Kvantum 主题
# env = QT_STYLE_OVERRIDE,kvantum-dark
  
# # 设置 GTK 主题
# env = GTK_THEME,Adwaita:dark
 
# # 设置图标主题
# env = XCURSOR_THEME,Adwaita
# env = XCURSOR_SIZE,24

# 窗口聚焦切换（使用 WIN + J/K）
# bind = $mainMod, K, cyclenext, prev  # 循环到上一个窗口
# bind = $mainMod, J, cyclenext, next  # 循环到下一个窗口

# 滚动布局控制
# bind = $mainMod, J, layoutmsg, move +col      # 向右滚动一列
# bind = $mainMod, K,  layoutmsg, move -col      # 向左滚动一列

# === 工作区创建与切换 ===
bind = $mainMod, H, workspace, e-1    # 切换到上一个工作区（跳过空的）
bind = $mainMod, L, workspace, e+1    # 切换到下一个工作区（跳过空的）

# 无限滚动设置
scrolling {
    # 默认列宽（屏幕宽度的百分比，0.1~1.0）
    column_width = 0.7
    
    # 当只有一列时，是否自动全屏
    fullscreen_on_one_column = true 
    
    # 新窗口添加方向：right/left/down/up
    direction = right 
    
    # 焦点跟随：窗口被聚焦时自动滚动使其可见
    follow_focus = true
    
    # 预置列宽列表，供快速切换使用
    explicit_column_widths = 0.2, 0.333, 0.5, 0.7, 0.92, 1.0

}

# ===== 窗口导航=====
bind = $mainMod, K, layoutmsg, focus r       # 向右滚动一列
bind = $mainMod, J,  layoutmsg, focus l      # 向左滚动一列
# bind = $mainMod, J, layoutmsg, focus d       # 向下滚动一列
# bind = $mainMod, K,  layoutmsg, focus u      # 向上滚动一列

# ===== 列宽调整 =====
bind = $mainMod, W,  layoutmsg, colresize +0.05        # 加宽当前列
bind = $mainMod, B,  layoutmsg, colresize -0.05        # 缩窄当前列
bind = $mainMod CTRL, K, layoutmsg, colresize +conf  # 下一个预置宽度
bind = $mainMod CTRL, J,  layoutmsg, colresize -conf  # 上一个预置宽度

# ===== 高级操作 =====
# bind = $mainMod, p, layoutmsg, promote              # 当前窗口独占一列
bind = $mainMod SHIFT, K, layoutmsg, swapcol r  # 当前列与右列交换
bind = $mainMod SHIFT, J,  layoutmsg, swapcol l  # 当前列与左列交换
bind = $mainMod, y, layoutmsg, fit all              # 让所有窗口适应屏幕

